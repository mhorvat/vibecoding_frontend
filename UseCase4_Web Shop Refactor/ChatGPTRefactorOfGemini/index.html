<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twisted Corner Store</title>
  <!-- Skip link for accessibility -->
  <a class="u-skip-link" href="#main-content">Skip to main content</a>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap Customized Build -->
  <link href="styles/bootstrap-custom.min.css" rel="stylesheet">
  <!-- Project CSS -->
  <link href="styles/layout.css" rel="stylesheet">
  <link href="styles/components.css" rel="stylesheet">
  <link href="styles/utilities.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar--white" role="navigation">
    <div class="container">
      <a href="#home" class="navbar__brand">Twisted Corner Store</a>
      <button class="navbar__toggle" aria-expanded="false" aria-controls="navbar-menu">
        <span class="navbar__icon"></span>
      </button>
      <div id="navbar-menu" class="navbar__menu">
        <ul class="navbar__list">
          <li><a href="#home" class="navbar__item is-active" id="home-nav-link">Home</a></li>
          <li><a href="#about" class="navbar__item" id="about-nav-link">About</a></li>
          <li class="navbar__item dropdown">
            <button class="dropdown__toggle" aria-haspopup="true" aria-expanded="false">Shop</button>
            <ul class="dropdown__menu">
              <li><button data-category="all" class="dropdown__item category-filter">All Puzzles</button></li>
              <li><hr class="dropdown__divider"></li>
              <li><button data-category="2x2" class="dropdown__item category-filter">2x2 Cubes</button></li>
              <!-- ... other categories ... -->
            </ul>
          </li>
        </ul>
        <div class="navbar__controls">
          <input id="search-input" type="search" placeholder="Search puzzles..." aria-label="Search" class="search-input">
          <button type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas" aria-label="Open shopping cart" class="btn btn--outline-dark">
            <i class="bi-cart-fill"></i>
            <span id="cart-count" class="badge">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav>
  <main id="main-content" role="main">
    <section id="home" class="home-page">
      <header class="hero">
        <h1 id="page-title" class="hero__title">Shop Rubik's Cubes</h1>
        <p class="hero__subtitle">Find your perfect cube puzzle</p>
      </header>
      <div id="product-grid" class="product-grid">
        <!-- Product items rendered by JS -->
      </div>
    </section>
    <section id="about" class="about-page" hidden>
      <article>
        <h2>About Twisted Corner Store</h2>
        <p><!-- About copy -->Lorem ipsum...</p>
      </article>
    </section>
  </main>
  <aside id="cartOffcanvas" class="offcanvas" tabindex="-1" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas__header">
      <h2 id="cartOffcanvasLabel">Shopping Cart</h2>
      <button type="button" data-bs-dismiss="offcanvas" aria-label="Close" class="btn-close"></button>
    </div>
    <div class="offcanvas__body" aria-live="polite">
      <ul id="cart-items" class="cart-list"></ul>
      <div class="cart-summary">
        <span>Total:</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="btn btn--primary btn--block" id="checkout-btn">Checkout</button>
    </div>
  </aside>
  <footer class="footer" role="contentinfo">
    <p>&copy; 2025 Twisted Corner Store</p>
  </footer>
  <!-- Scripts -->
  <script type="module" src="scripts/main.js" defer></script>
</body>
</html>
