<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twisted Corner Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg main-nav">
    <div class="container-fluid">
        <a class="navbar-brand main-nav__brand" href="#">
            <img src="images/web_shop_logo.png" alt="Twisted Corner Store Logo" width="32" height="32" class="d-inline-block align-text-top me-2">
            Twisted Corner Store
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="#" id="home-link">Home</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="shopDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                    <ul class="dropdown-menu main-nav__dropdown-menu" aria-labelledby="shopDropdown">
                        <li><a class="dropdown-item filter-item" href="#" data-filter="3x3 Cube">3x3 Cubes</a></li>
                        <li><a class="dropdown-item filter-item" href="#" data-filter="2x2 Cube">2x2 Cubes</a></li>
                        <li><a class="dropdown-item filter-item" href="#" data-filter="4x4 Cube">4x4 Cubes</a></li>
                        <li><a class="dropdown-item filter-item" href="#" data-filter="Pyraminx">Pyraminxes</a></li>
                        <li><a class="dropdown-item filter-item" href="#" data-filter="Megaminx">Megaminxes</a></li>
                        <li><a class="dropdown-item filter-item" href="#" data-filter="Mirror Cube">Mirror Cubes</a></li>
                    </ul>
                </li>
            </ul>
            <form class="d-flex" role="search" id="search-form">
                <input id="search-input" class="form-control me-2 rounded-pill" type="search" placeholder="Search puzzles" aria-label="Search">
            </form>
            <button class="btn btn-outline-light position-relative ms-2 rounded-pill" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas">
                <i class="bi bi-cart-fill me-1"></i>Cart
                <span id="cart-count" class="badge position-absolute top-0 start-100 translate-middle" aria-live="polite">0</span>
            </button>
        </div>
    </div>
</nav>

<header class="page-header text-center py-5">
    <div class="container">
        <h1 class="display-4" id="page-title">Shop Rubik's Cubes</h1>
        <p class="lead">Find your perfect cube puzzle</p>
    </div>
</header>

<main class="container my-5">
    <div class="row g-4" id="products-container"></div>
</main>

<div class="offcanvas offcanvas-end cart-offcanvas" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="cartOffcanvasLabel">Your Cart</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <div id="cart-items-container">
            <p id="cart-empty-message" class="text-muted">No items in cart.</p>
        </div>
        <div class="mt-3 pt-3 border-top d-flex justify-content-between fw-bold">
            <span>Total:</span>
            <span id="cart-total" role="status">$0.00</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
